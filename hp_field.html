<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一人回し — PokePoLix</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Zen+Antique+Soft&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      :root {
        --ink: #1e0e06;
        --ink-mid: rgba(30, 14, 6, 0.7);
        --ink-light: rgba(30, 14, 6, 0.45);
        --border: rgba(90, 50, 15, 0.3);
        --bd: rgba(90, 50, 15, 0.6);
        --slot: rgba(200, 170, 90, 0.18);
        --slotb: rgba(90, 50, 15, 0.22);
        --p1bg: rgba(26, 58, 106, 0.12);
        --p1c: rgba(26, 58, 106, 0.9);
        --p2bg: rgba(106, 26, 26, 0.12);
        --p2c: rgba(106, 26, 26, 0.9);
        --font-logo: "Lavishly Yours", cursive;
        --font-ja: "Zen Antique Soft", serif;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: var(--font-ja);
        background-color: #c9a45a;
        background-image: radial-gradient(
            ellipse at 20% 20%,
            rgba(80, 40, 10, 0.15) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(80, 40, 10, 0.12) 0%,
            transparent 40%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            #e2bf82 0%,
            #c49850 65%,
            #a87a38 100%
          );
        color: var(--ink);
      }

      /* スマホ版MP行のスタイル */
      .mob-mp-row {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        padding: 2px 4px;
        background: rgba(200, 170, 90, 0.1);
        border-top: 1px dashed var(--border);
        min-height: 52px;
        align-items: center;
        flex-shrink: 0;
      }
      .mob-mp-row::-webkit-scrollbar {
        display: none;
      }

      /* 既存のメディアクエリ修正 */
      @media (max-width: 700px) {
        #field-area,
        #field-area * {
          display: none !important;
        }
        #mob-view {
          display: flex !important;
        }
        #ctrl {
          padding: 3px 4px;
          gap: 2px;
          flex-wrap: nowrap;
          overflow-x: auto;
        }
        .tbadge {
          font-size: 9px;
          padding: 2px 5px;
          flex-shrink: 0;
        }
        .tnum {
          font-size: 14px;
        }
        .cbs {
          gap: 2px;
          margin-left: auto;
        }
        .cb {
          font-size: 9px;
          padding: 2px 5px;
        }
        #tut-box {
          width: calc(100vw - 16px) !important;
          left: 8px !important;
          bottom: 8px !important;
          top: auto !important;
        }
      }

      /* ...（中略：既存のCSSは保持）... */

      /* チュートリアルハイライト */
      .tut-highlight {
        outline: 3px solid rgba(200, 40, 20, 0.85) !important;
        outline-offset: 2px;
        box-shadow: 0 0 12px rgba(200, 40, 20, 0.5) !important;
        animation: tutPulse 1.2s ease-in-out infinite;
        position: relative;
        z-index: 50;
      }
      @keyframes tutPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <div id="setup">
      <div class="setup-inner">
        <div class="setup-logo">Poke<span>Po</span>Lix</div>
        <div class="setup-players">
          <div>
            <div class="setup-player-label p1-lbl">1P デッキ</div>
            <div id="dl-p1" class="deck-list"></div>
          </div>
          <div>
            <div class="setup-player-label p2-lbl">2P デッキ</div>
            <div id="dl-p2" class="deck-list"></div>
          </div>
        </div>
        <button class="btn-start" id="btn-start" disabled onclick="startGame()">
          ゲームを開始する
        </button>
        <button
          onclick="startStarter()"
          style="width: 100%; margin-top: 10px; padding: 12px; cursor: pointer"
        >
          スターターでチュートリアル
        </button>
      </div>
    </div>

    <div id="game">
      <div id="ctrl">
        <span class="tbadge" id="tbadge">1P のターン</span>
        <span class="tnum" id="tnum">1</span>
        <div class="cbs">
          <button class="cb cb-o" id="btn-sb" onclick="doStandby()">
            スタンバイ実行
          </button>
          <button class="cb cb-p" id="btn-next" onclick="nextPhase()">
            エンドへ →
          </button>
          <button class="cb cb-s" onclick="doSwitch()">⇄ サイド交代</button>
        </div>
      </div>

      <div
        id="mob-view"
        style="display: none; flex-direction: column; flex: 1; overflow: hidden"
      >
        <div
          id="mob-p2"
          style="background: rgba(106, 26, 26, 0.08); flex: none"
        >
          <div
            id="mob-hdr-p2"
            style="
              padding: 3px 8px;
              font-size: 10px;
              background: rgba(106, 26, 26, 0.15);
            "
          >
            2P (後攻) <span id="mob-life-p2">❤️ 3</span>
          </div>
          <div id="mob-row1-p2" style="display: flex; padding: 4px"></div>
          <div id="mob-row2-p2" style="display: flex; padding: 4px"></div>
          <div id="mob-mp-p2" class="mob-mp-row"></div>
        </div>
        <div style="height: 2px; background: var(--border)"></div>
        <div
          id="mob-p1"
          style="
            background: rgba(26, 58, 106, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
          "
        >
          <div
            id="mob-hdr-p1"
            style="
              padding: 3px 8px;
              font-size: 10px;
              background: rgba(26, 58, 106, 0.15);
            "
          >
            1P (先攻) <span id="mob-life-p1">❤️ 3</span>
          </div>
          <div id="mob-row1-p1" style="display: flex; padding: 4px"></div>
          <div id="mob-row2-p1" style="display: flex; padding: 4px"></div>
          <div id="mob-mp-p1" class="mob-mp-row"></div>
          <div
            id="mob-hand-p1"
            class="hcards"
            style="flex: 1; overflow-x: auto; padding: 4px"
          ></div>
        </div>
      </div>

      <div id="field-area"></div>
    </div>

    <div
      id="tut-box"
      style="
        display: none;
        position: fixed;
        z-index: 300;
        width: 360px;
        background: #e2c882;
        border: 2px solid rgba(90, 50, 15, 0.5);
      "
    >
      <div
        style="
          background: rgba(80, 45, 12, 0.7);
          padding: 8px;
          color: #f0e0c0;
          display: flex;
          justify-content: space-between;
        "
      >
        <span id="tut-title"></span>
        <span id="tut-step"></span>
      </div>
      <div style="padding: 12px">
        <p id="tut-msg" style="font-size: 12px; white-space: pre-wrap"></p>
      </div>
      <div style="display: flex; gap: 4px; padding: 8px">
        <button onclick="prevTut()" style="flex: 1">◀</button>
        <button onclick="nextTut()" style="flex: 2; font-weight: bold">
          次へ
        </button>
        <button onclick="closeTut()">閉じる</button>
      </div>
    </div>

    <script>
      // 17ステップに拡張されたチュートリアルデータ
      const TUTORIAL_STEPS = [
        {
          step: 1,
          title: "画面の見方1",
          msg: "左側の青いエリアが1P（あなた）、右側の赤いエリアが2P（相手）です。",
          mobmsg: "上が相手(2P)、下が自分(1P)のエリアです。",
        },
        {
          step: 2,
          title: "画面の見方2",
          msg: "一番下が手札です。右クリック（長押し）でプレイ内容を選べます。",
          mobmsg: "一番下が手札です。タップで詳細、長押しでプレイできます。",
        },
        {
          step: 3,
          title: "画面の見方3",
          msg: "中央が戦場（メイン）とその下のサポートエリアです。",
          mobmsg: "中央の広い場所が戦場、その下がサポートエリアです。",
        },
        {
          step: 4,
          title: "画面の見方4",
          msg: "さらに下にあるのがMPエリアです。カードを出すコストになります。",
          mobmsg: "一番下の隙間がMPエリアです。ここにカードを溜めて戦います。",
        },
        {
          step: 5,
          title: "画面の見方5",
          msg: "一番左にはライフがあります。これが0になると負けです。",
          mobmsg: "左端のカードがライフです。3枚なくなると負けです。",
        },
        {
          step: 6,
          title: "ターンの流れ",
          msg: "「スタンバイ」→「メイン」→「エンド」の順に進みます。",
          mobmsg: "スタンバイで準備し、メインで戦い、エンドで交代します。",
        },
        {
          step: 7,
          title: "【1P】スタンバイ",
          msg: "「スタンバイ実行」を押すと、MPが全回復しカードを1枚引きます。",
          mobmsg:
            "下の「スタンバイ実行」を押して、MPを回復しカードを引きます。",
          trigger: "standby",
        },
        {
          step: 8,
          title: "【1P】手札捨て",
          msg: "先攻1ターン目は手札が8枚になります。1枚捨て札に送ってください。",
          mobmsg:
            "先攻は手札が多くなります。1枚選んで「捨て札」にしてください。",
          trigger: "trash",
        },
        {
          step: 9,
          title: "【1P】プレイ",
          msg: "手札のカードを1枚「MP」に置き、余ったMPでキャラを出しましょう。",
          mobmsg: "手札を1枚MPに置き、キャラを戦場へ出してみましょう。",
        },
        {
          step: 10,
          title: "【1P】エンドへ",
          msg: "メインフェイズを終えるには「エンドへ」を押します。",
          mobmsg: "「エンドへ」を押して、エンドフェイズに進みます。",
          trigger: "endphase",
        },
        {
          step: 11,
          title: "【1P】交代",
          msg: "「ターン終了」を押し、「サイド交代」で2P視点に切り替えます。",
          mobmsg: "「ターン終了」を押し、サイド交代で2Pを操作しましょう。",
          trigger: "switch",
        },
        {
          step: 12,
          title: "【2P】スタンバイ",
          msg: "2Pのターンです。まずは「スタンバイ実行」をしましょう。",
          mobmsg: "2Pの番です。スタンバイを実行します。",
          trigger: "standby",
        },
        {
          step: 13,
          title: "【2P】MP確認",
          msg: "後攻は最初からMPが1枚あります。これを使ってキャラを出せます。",
          mobmsg: "後攻は最初からMPが1本ある状態で始まります。",
        },
        {
          step: 14,
          title: "【2P】エンドへ",
          msg: "2Pの行動を終えたら、エンドフェイズへ進みましょう。",
          mobmsg: "2Pのメインを終了します。",
          trigger: "endphase",
        },
        {
          step: 15,
          title: "アタック(決闘)",
          msg: "キャラを選択して相手を攻撃します。MPを消費し自身は休止します。",
          mobmsg:
            "キャラをタップして攻撃！MPを使い、終わると「休」になります。",
        },
        {
          step: 16,
          title: "ライフ処理",
          msg: "攻撃が成功すると、相手のライフが1枚減ります。",
          mobmsg: "ライフを削って勝利を目指します。",
        },
        {
          step: 17,
          title: "完了！",
          msg: "これで一通りの流れを学びました。自由に対戦を続けてください！",
          mobmsg: "チュートリアル完了！自由に対戦してみましょう。",
        },
      ];

      let currentTutIdx = 0;
      let isTutMode = false;

      function updateTutDisplay() {
        const step = TUTORIAL_STEPS[currentTutIdx];
        const isMob = window.innerWidth <= 700;
        document.getElementById("tut-title").innerText = step.title;
        document.getElementById("tut-step").innerText = `${
          currentTutIdx + 1
        } / 17`;
        document.getElementById("tut-msg").innerText =
          isMob && step.mobmsg ? step.mobmsg : step.msg;
        clearHighlight();
        // ハイライト誘導（必要に応じて要素を指定）
      }

      function nextTut() {
        if (currentTutIdx < TUTORIAL_STEPS.length - 1) {
          currentTutIdx++;
          updateTutDisplay();
        }
      }

      // 自動進行用フックを既存関数に組み込む
      function doStandby() {
        /* 既存のスタンバイ処理 */
        if (isTutMode && TUTORIAL_STEPS[currentTutIdx].trigger === "standby")
          nextTut();
      }

      function nextPhase() {
        /* 既存のフェイズ進行処理 */
        if (isTutMode && TUTORIAL_STEPS[currentTutIdx].trigger === "endphase")
          nextTut();
      }

      function doSwitch() {
        /* 既存のサイド交代処理 */
        if (isTutMode && TUTORIAL_STEPS[currentTutIdx].trigger === "switch")
          nextTut();
      }

      // スマホ版描画の際にMP行を更新する処理を追加
      function updateView() {
        /* 既存の描画ロジック... */
        const players = [0, 1];
        players.forEach((pIdx) => {
          const mpContainer = document.getElementById(`mob-mp-p${pIdx + 1}`);
          if (mpContainer) {
            mpContainer.innerHTML = "";
            state.players[pIdx].field.mp.forEach((card) => {
              const div = document.createElement("div");
              div.className = "mp-fc" + (card.rest ? " rest" : "");
              div.innerHTML = `<img src="${card.image}">`;
              mpContainer.appendChild(div);
            });
          }
        });
      }
    </script>
  </body>
</html>
