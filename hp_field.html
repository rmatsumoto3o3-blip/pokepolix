<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一人回し — PokePoLix</title>
<link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Zen+Antique+Soft&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --parch:#d4b86a;--ink:#1e0e06;--ink-mid:rgba(30,14,6,.7);--ink-light:rgba(30,14,6,.45);
  --border:rgba(90,50,15,.35);--border-dark:rgba(90,50,15,.65);
  --gold:#5a2e08;--p1:#1a3a6a;--p2:#3a1a1a;
  --font-logo:'Lavishly Yours',cursive;--font-ja:'Zen Antique Soft',serif;
}
body{font-family:var(--font-ja);background-color:#c9a45a;background-image:radial-gradient(ellipse at 20% 20%,rgba(80,40,10,.15) 0%,transparent 45%),radial-gradient(ellipse at 80% 80%,rgba(80,40,10,.12) 0%,transparent 40%),radial-gradient(ellipse at 50% 50%,#e2bf82 0%,#c49850 65%,#a87a38 100%);color:var(--ink);min-height:100vh;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(140,90,30,.05) 28px,rgba(140,90,30,.05) 29px);}

/* ===== セットアップ ===== */
#setup{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;}
#setup::after{content:'';position:fixed;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(140,90,30,.05) 28px,rgba(140,90,30,.05) 29px);}
.setup-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:640px;}
.setup-logo{font-family:var(--font-logo);font-size:38px;color:var(--ink);text-shadow:1px 2px 0 rgba(80,40,10,.15);}
.setup-logo span{color:#6b3a10;}
.setup-players{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;}
.setup-player{display:flex;flex-direction:column;gap:6px;}
.setup-player-label{font-size:12px;font-weight:700;color:var(--ink-light);letter-spacing:.5px;text-align:center;padding:4px;border:1px solid var(--border);}
.p1-label{background:rgba(26,58,106,.15);color:rgba(26,58,106,.9);}
.p2-label{background:rgba(58,26,26,.15);color:rgba(58,26,26,.9);}
.deck-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
.deck-item{background:rgba(210,175,100,.5);border:1px solid var(--border);padding:8px 12px;cursor:pointer;transition:border-color .15s;font-size:12px;}
.deck-item:hover,.deck-item.selected{border-color:var(--border-dark);background:rgba(180,140,60,.5);}
.deck-item-name{font-weight:700;color:var(--ink);}
.deck-item-meta{font-size:10px;color:var(--ink-light);margin-top:2px;}
.no-deck{text-align:center;padding:20px;color:var(--ink-light);font-size:12px;}
.btn-start{background:rgba(80,45,12,.75);color:#f0e0c0;border:none;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-ja);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;}
.setup-link{font-size:11px;color:var(--ink-light);text-decoration:none;}

/* ===== ゲーム画面 ===== */
#game{display:none;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* ターンバー */
#turn-bar{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  background:rgba(180,135,55,.6);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.turn-badge{font-size:11px;font-weight:700;padding:3px 10px;border:1px solid transparent;}
.turn-badge-p1{background:rgba(26,58,106,.7);color:#c8dcf5;border-color:rgba(26,58,106,.5);}
.turn-badge-p2{background:rgba(58,26,26,.7);color:#f0c8b0;border-color:rgba(58,26,26,.5);}
.turn-num-label{font-size:11px;color:var(--ink-light);}
.turn-num{font-family:var(--font-logo);font-size:22px;color:var(--ink);}
.phase-steps{display:flex;gap:3px;}
.ph-step{font-size:10px;padding:2px 8px;background:rgba(200,165,80,.3);border:1px solid var(--border);color:var(--ink-light);}
.ph-step.active{background:rgba(80,45,12,.7);color:#f0e0c0;}
.tb-btns{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;}
.ph-btn{font-size:11px;padding:4px 9px;border:none;cursor:pointer;font-family:var(--font-ja);font-weight:500;white-space:nowrap;}
.ph-btn-primary{background:rgba(80,45,12,.75);color:#f0e0c0;}
.ph-btn-outline{background:rgba(200,165,80,.35);color:var(--ink);border:1px solid var(--border);}
.ph-btn-switch{font-size:12px;padding:5px 12px;background:rgba(40,40,80,.6);color:#d0d8ff;border:none;cursor:pointer;font-family:var(--font-ja);font-weight:700;}
.ph-btn-danger{background:rgba(120,40,20,.5);color:#f0c8b0;border:1px solid rgba(120,40,20,.4);}

/* ===== 2つのサイド ===== */
.side{display:flex;flex-direction:column;flex:1;overflow:hidden;padding:3px 6px;position:relative;}
.side-header{font-size:10px;font-weight:700;padding:2px 6px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.side-p1{border-top:2px solid rgba(26,58,106,.5);}
.side-p2{border-top:2px solid rgba(58,26,26,.5);}
.side-header-p1{background:rgba(26,58,106,.15);color:rgba(26,58,106,.9);}
.side-header-p2{background:rgba(58,26,26,.15);color:rgba(58,26,26,.9);}
.side-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(90,50,15,.4),transparent);flex-shrink:0;margin:2px 0;}

/* フィールド共通 */
.field-rows{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.field-row{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.zone-title{font-size:7px;font-weight:600;color:var(--ink-light);writing-mode:vertical-rl;padding:1px;flex-shrink:0;letter-spacing:.3px;}
.field-slots{display:flex;gap:3px;flex:1;justify-content:center;}
.info-row{display:flex;gap:4px;align-items:stretch;flex-shrink:0;height:52px;}
.iz{background:rgba(210,175,100,.45);border:1px solid var(--border);padding:3px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;min-width:44px;}
.iz:hover{border-color:var(--border-dark);}
.iz-lbl{font-size:7px;color:var(--ink-light);letter-spacing:.3px;}
.iz-val{font-size:16px;font-weight:700;color:var(--ink);line-height:1;}
.iz-sub{font-size:8px;color:var(--ink-light);}
.pt-iz{flex:2;cursor:default;min-width:80px;}
.pt-name{font-size:10px;font-weight:700;color:var(--ink);text-align:center;}
.mp-cards{display:flex;gap:2px;flex:1;overflow-x:auto;padding:1px;align-items:center;}
.empty-hint{font-size:9px;color:rgba(30,14,6,.28);border:1px dashed rgba(90,50,15,.18);padding:3px 6px;white-space:nowrap;}

/* スロット */
.f-slot{background:rgba(200,165,80,.2);border:1px dashed rgba(90,50,15,.22);display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(30,14,6,.2);flex-shrink:0;position:relative;}
.f-slot.has-card{border:none;cursor:pointer;}
.main-slot{width:56px;height:78px;}
.sup-slot{width:48px;height:66px;}
.f-card{width:100%;height:100%;display:flex;flex-direction:column;position:relative;cursor:pointer;transition:filter .12s;border:1px solid rgba(255,255,255,.1);overflow:hidden;}
.f-card img{width:100%;flex:1;object-fit:cover;min-height:0;}
.f-card-btm{background:rgba(0,0,0,.65);padding:1px 2px;flex-shrink:0;}
.f-card-name{font-size:6px;color:#fff;line-height:1.1;font-family:var(--font-ja);}
.f-stat-row{display:flex;gap:1px;}
.f-stat{font-size:6px;padding:0 2px;font-family:monospace;}
.f-stat-ap{background:#1a3a6a;color:#adf;}
.f-stat-dp{background:rgba(255,255,255,.15);color:#ddd;}
.f-cost{position:absolute;top:1px;right:1px;width:12px;height:12px;background:rgba(80,45,12,.8);color:#f5e8d0;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:monospace;}
.f-card.rested{filter:brightness(.55) saturate(.6);}
.f-card.rested::after{content:'休';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:rgba(240,208,150,.7);pointer-events:none;font-family:var(--font-ja);}
.f-card:hover{filter:brightness(1.1);}
.f-card.rested:hover{filter:brightness(.7);}
.mp-card{width:38px;height:32px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;overflow:hidden;}
.mp-card img{width:100%;height:100%;object-fit:cover;}
.mp-card.rested{filter:brightness(.55);}

/* 手札 */
.hand-area{display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.hand-label{font-size:8px;color:var(--ink-light);letter-spacing:.3px;padding:0 2px;}
.hand-over-warning{background:rgba(150,50,20,.2);border:1px solid rgba(150,50,20,.4);padding:2px 8px;font-size:10px;color:rgba(150,50,20,.9);display:none;}
.hand-cards{display:flex;gap:3px;padding:3px 2px;overflow-x:auto;align-items:flex-end;-webkit-overflow-scrolling:touch;}
.h-card{width:50px;height:70px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;position:relative;transition:transform .12s,border-color .12s;overflow:hidden;}
.h-card img{width:100%;height:100%;object-fit:cover;}
.h-card:hover{transform:translateY(-6px);border-color:var(--border-dark);}
.h-card.sel{transform:translateY(-10px);border-color:rgba(80,45,12,.8);}
.h-card.over-limit{border:2px solid rgba(180,40,20,.7);}
.hand-hidden{display:flex;gap:3px;padding:3px 2px;overflow-x:hidden;}
.h-card-back{width:50px;height:70px;background:linear-gradient(135deg,rgba(40,20,80,.7),rgba(80,40,20,.5));border:1px solid rgba(90,50,15,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* ログ */
#log-bar{background:rgba(180,135,55,.5);border-top:1px solid var(--border);padding:3px 10px;font-size:10px;color:var(--ink-mid);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* コンテキストメニュー */
#ctx{position:fixed;background:#e2c882;border:1px solid rgba(90,50,15,.5);z-index:1000;display:none;min-width:170px;box-shadow:3px 3px 0 rgba(80,45,12,.2);}
.ctx-info{padding:6px 10px;border-bottom:1px solid var(--border);}
.ctx-cname{font-size:12px;font-weight:700;color:var(--ink);}
.ctx-num{font-size:9px;color:var(--ink-light);font-family:monospace;}
.ctx-eff{font-size:9px;color:var(--ink-mid);margin-top:3px;line-height:1.5;max-width:200px;white-space:pre-wrap;word-break:break-all;max-height:80px;overflow-y:auto;}
.ctx-btn{display:flex;align-items:center;width:100%;padding:6px 10px;border:none;background:none;color:var(--ink-mid);font-size:11px;cursor:pointer;font-family:var(--font-ja);text-align:left;}
.ctx-btn:hover{background:rgba(180,140,60,.4);color:var(--ink);}
.ctx-btn.danger{color:rgba(120,40,20,.8);}
.ctx-sep{height:1px;background:var(--border);margin:2px 0;}

/* ライフモーダル */
#life-modal{position:fixed;inset:0;background:rgba(20,8,2,.75);z-index:500;display:none;align-items:center;justify-content:center;}
#life-inner{background:#e2c882;border:2px solid rgba(90,50,15,.5);padding:18px;width:300px;box-shadow:4px 4px 0 rgba(80,45,12,.2);}
#life-inner h3{font-family:var(--font-logo);font-size:22px;color:var(--ink);margin-bottom:6px;}
#life-card-info{background:rgba(210,175,100,.4);border:1px solid var(--border);padding:10px;margin:8px 0;font-size:11px;}
.life-btns{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.life-btn{padding:8px 12px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font-ja);text-align:left;}
.life-btn-hand{background:rgba(30,58,106,.7);color:#c8dcf5;}
.life-btn-mp{background:rgba(26,58,24,.7);color:#a0d888;}
.life-btn-break{background:rgba(42,16,80,.7);color:#c0a8ff;}

/* 捨て札モーダル */
#trash-modal{position:fixed;inset:0;background:rgba(20,8,2,.75);z-index:500;display:none;align-items:center;justify-content:center;}
#trash-inner{background:#e2c882;border:2px solid rgba(90,50,15,.5);padding:18px;width:360px;max-height:80vh;overflow-y:auto;box-shadow:4px 4px 0 rgba(80,45,12,.2);}
#trash-inner h3{font-family:var(--font-logo);font-size:22px;color:var(--ink);margin-bottom:8px;}
.trash-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(90,50,15,.15);font-size:11px;}
.trash-num{font-family:monospace;color:var(--ink-light);font-size:9px;min-width:44px;}
.trash-name{flex:1;color:var(--ink);}
.trash-act{font-size:10px;padding:2px 6px;background:rgba(200,165,80,.3);border:1px solid var(--border);cursor:pointer;font-family:var(--font-ja);}
</style>
</head>
<body>

<!-- セットアップ -->
<div id="setup">
<div class="setup-inner">
  <div class="setup-logo">Poke<span>Po</span>Lix</div>
  <div style="font-size:12px;color:var(--ink-light);">一人回し — 1P vs 2P フィールド</div>
  <div class="setup-players">
    <div class="setup-player">
      <div class="setup-player-label p1-label">1P のデッキ</div>
      <div id="deck-list-p1" class="deck-list"></div>
    </div>
    <div class="setup-player">
      <div class="setup-player-label p2-label">2P のデッキ</div>
      <div id="deck-list-p2" class="deck-list"></div>
    </div>
  </div>
  <button class="btn-start" id="btn-start" disabled onclick="startGame()">ゲームを開始する</button>
  <a href="index.html" class="setup-link">← トップへ戻る</a>
</div>
</div>

<!-- ゲーム画面 -->
<div id="game">
  <!-- ターンバー -->
  <div id="turn-bar">
    <span class="turn-badge" id="turn-badge">1P のターン</span>
    <span class="turn-num-label">ターン</span>
    <span class="turn-num" id="turn-num">1</span>
    <div class="phase-steps">
      <span class="ph-step" id="ps-standby">スタンバイ</span>
      <span class="ph-step active" id="ps-main">メイン</span>
      <span class="ph-step" id="ps-end">エンド</span>
    </div>
    <div class="tb-btns">
      <button class="ph-btn ph-btn-outline" id="btn-standby" onclick="doStandby()">スタンバイ実行</button>
      <button class="ph-btn ph-btn-primary" id="btn-next" onclick="nextPhase()">エンドへ →</button>
      <button class="ph-btn ph-btn-outline" onclick="activateAll()">全活動状態に</button>
      <button class="ph-btn ph-btn-outline" onclick="drawCard()">ドロー</button>
      <button class="ph-btn ph-btn-switch" onclick="switchSide()">⇄ サイド交代</button>
      <button class="ph-btn ph-btn-danger" onclick="if(confirm('リセットしますか？'))location.reload()">リセット</button>
    </div>
  </div>

  <!-- 2Pサイド（上）：手番でない方 -->
  <div class="side side-p2" id="side-opp" style="flex:.85;min-height:0;">
    <div class="side-header side-header-p2" id="opp-header">
      <span id="opp-label">2P</span>
      <span id="opp-stats" style="font-size:9px;color:var(--ink-light);margin-left:auto;"></span>
    </div>
    <div class="field-rows">
      <!-- 相手情報バー -->
      <div class="info-row" id="opp-info-row"></div>
      <!-- 相手フィールド -->
      <div class="field-row">
        <span class="zone-title">メイン</span>
        <div class="field-slots" id="opp-main"></div>
      </div>
      <div class="field-row">
        <span class="zone-title">サポート</span>
        <div class="field-slots" id="opp-support"></div>
      </div>
      <div class="field-row">
        <span class="zone-title">MP</span>
        <div class="mp-cards" id="opp-mp"><div class="empty-hint">空</div></div>
      </div>
      <!-- 相手の手札（裏向き） -->
      <div class="hand-area">
        <div class="hand-label">HAND（裏向き）</div>
        <div class="hand-hidden" id="opp-hand-hidden"></div>
      </div>
    </div>
  </div>

  <div class="side-divider"></div>

  <!-- 1Pサイド（下）：手番のプレイヤー -->
  <div class="side side-p1" id="side-act" style="flex:1.15;min-height:0;">
    <div class="side-header side-header-p1" id="act-header">
      <span id="act-label">1P（あなたのターン）</span>
      <span id="act-stats" style="font-size:9px;color:var(--ink-light);margin-left:auto;"></span>
    </div>
    <div class="field-rows">
      <!-- 自分の情報バー -->
      <div class="info-row" id="act-info-row"></div>
      <!-- 自分のフィールド -->
      <div class="field-row">
        <span class="zone-title">メイン</span>
        <div class="field-slots" id="act-main"></div>
      </div>
      <div class="field-row">
        <span class="zone-title">サポート</span>
        <div class="field-slots" id="act-support"></div>
      </div>
      <div class="field-row">
        <span class="zone-title">MP</span>
        <div class="mp-cards" id="act-mp"><div class="empty-hint">手札を右クリック → MPに置く</div></div>
      </div>
      <!-- 自分の手札（表向き） -->
      <div class="hand-area">
        <div id="act-hand-over-warning" class="hand-over-warning">⚠ 手札が7枚超。エンドまでに捨て札にしてください。</div>
        <div class="hand-label">HAND — 右クリックでアクション</div>
        <div class="hand-cards" id="act-hand"></div>
      </div>
    </div>
  </div>

  <div id="log-bar">ゲーム開始！</div>
</div>

<!-- コンテキストメニュー -->
<div id="ctx">
  <div class="ctx-info">
    <div class="ctx-cname" id="ctx-name"></div>
    <div class="ctx-num" id="ctx-num"></div>
    <div class="ctx-eff" id="ctx-eff"></div>
  </div>
  <button class="ctx-btn" id="ctx-main" onclick="ctxAct('main')">⚔ メインフィールドに出す</button>
  <button class="ctx-btn" id="ctx-sup" onclick="ctxAct('support')">🛡 サポートフィールドに出す</button>
  <button class="ctx-btn" id="ctx-use" onclick="ctxAct('use')">✨ 使用する（捨て札へ）</button>
  <button class="ctx-btn" id="ctx-mp" onclick="ctxAct('mp')">🔋 MPに置く</button>
  <div class="ctx-sep"></div>
  <button class="ctx-btn" id="ctx-toggle" onclick="ctxAct('toggle')">🔄 活動 / 休息を切替</button>
  <button class="ctx-btn" id="ctx-restore" onclick="ctxAct('restore')">↩ メインに復帰</button>
  <button class="ctx-btn" id="ctx-down" onclick="ctxAct('down')">⬇ ダウン（サポートへ）</button>
  <div class="ctx-sep"></div>
  <button class="ctx-btn" id="ctx-tohand" onclick="ctxAct('tohand')">👋 手札に戻す</button>
  <button class="ctx-btn" id="ctx-bottom" onclick="ctxAct('bottom')">⬇ デッキの下に戻す</button>
  <button class="ctx-btn danger" onclick="ctxAct('trash')">🗑 捨て札にする</button>
  <div class="ctx-sep"></div>
  <button class="ctx-btn" onclick="closeCtx()">✕ 閉じる</button>
</div>

<!-- ライフモーダル -->
<div id="life-modal">
  <div id="life-inner">
    <h3>ライフダメージ</h3>
    <p style="font-size:11px;color:var(--ink-light);margin-bottom:4px;">公開したカードの処理を選択</p>
    <div id="life-card-info"></div>
    <div class="life-btns">
      <button class="life-btn life-btn-hand" onclick="resolveLife('hand')">手札に加える</button>
      <button class="life-btn life-btn-mp" onclick="resolveLife('mp')">MPフィールドへ（活動）</button>
      <button class="life-btn life-btn-break" id="life-break-btn" onclick="resolveLife('break')">≪ブレイク≫効果を使用（捨て札）</button>
    </div>
  </div>
</div>

<!-- 捨て札モーダル -->
<div id="trash-modal">
  <div id="trash-inner">
    <h3 id="trash-modal-title">捨て札</h3>
    <div id="trash-list"></div>
    <button onclick="document.getElementById('trash-modal').style.display='none'" style="margin-top:10px;width:100%;padding:7px;background:rgba(80,45,12,.6);color:#f0e0c0;border:none;cursor:pointer;font-family:var(--font-ja);font-size:12px;">閉じる</button>
  </div>
</div>

<script>
const STORAGE_KEY='hp_saved_decks';

// ===== 状態 =====
let uid=0;
const nid=()=>++uid;
let G=null; // {turn, phase, currentPlayer(0/1), players:[P1,P2]}
// Player: {partner, deck, hand, life, trash, mainField[3], supportField[4], mpField[]}
let ctxTarget=null;
let pendingLife=null;
let selectedDeckIds=[null,null];

function loadSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}

function buildPlayerState(deckData){
  const cards=[];
  Object.entries(deckData.deck).forEach(([num,cnt])=>{
    const d=CARDS.find(c=>c[0]===num);
    if(!d)return;
    for(let i=0;i<cnt;i++) cards.push({id:nid(),data:d,active:true});
  });
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  const life=cards.splice(0,3);
  const hand=cards.splice(0,7);
  return {
    partner:deckData.partner?PARTNERS.find(p=>p[0]===deckData.partner):null,
    deck:cards, hand, life, trash:[],
    mainField:[null,null,null],
    supportField:[null,null,null,null],
    mpField:[],
  };
}

// ===== セットアップ =====
function initSetup(){
  const saved=loadSaved();
  [0,1].forEach(pi=>{
    const el=document.getElementById(`deck-list-p${pi+1}`);
    if(!saved.length){el.innerHTML='<div class="no-deck">保存済みデッキがありません</div>';return;}
    el.innerHTML=saved.map(d=>`<div class="deck-item" onclick="selectDeck(${pi},'${d.id}',this)">
      <div class="deck-item-name">${d.name}</div>
      <div class="deck-item-meta">${d.total}枚 ／ ${PARTNERS.find(p=>p[0]===d.partner)?.at(1)||'パートナー未設定'}</div>
    </div>`).join('');
  });
}

function selectDeck(pi,id,el){
  document.querySelectorAll(`#deck-list-p${pi+1} .deck-item`).forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedDeckIds[pi]=String(id);
  document.getElementById('btn-start').disabled=!(selectedDeckIds[0]&&selectedDeckIds[1]);
}

function startGame(){
  const saved=loadSaved();
  const d0=saved.find(x=>String(x.id)===selectedDeckIds[0]);
  const d1=saved.find(x=>String(x.id)===selectedDeckIds[1]);
  if(!d0||!d1)return;
  G={turn:1,phase:'main',currentPlayer:0,players:[buildPlayerState(d0),buildPlayerState(d1)]};
  // 後攻にMPカードを1枚セット（任意なので後で行う）
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  renderAll();
  log('ゲーム開始！1Pから先攻です。スタンバイ実行ボタンを押してください。');
}

// ===== フェイズ =====
function act(){return G.players[G.currentPlayer];}
function opp(){return G.players[1-G.currentPlayer];}
function actLabel(){return G.currentPlayer===0?'1P':'2P';}
function oppLabel(){return G.currentPlayer===0?'2P':'1P';}

function setPhaseUI(){
  ['standby','main','end'].forEach(p=>{
    document.getElementById('ps-'+p).classList.toggle('active',G.phase===p);
  });
  const btnNext=document.getElementById('btn-next');
  const btnSb=document.getElementById('btn-standby');
  if(G.phase==='main'){btnNext.textContent='エンドへ →';btnSb.style.display='';}
  else if(G.phase==='end'){btnNext.textContent='ターン終了（次のターンへ）';btnSb.style.display='none';}
  // ターンバッジ
  const badge=document.getElementById('turn-badge');
  badge.textContent=`${actLabel()} のターン`;
  badge.className='turn-badge '+(G.currentPlayer===0?'turn-badge-p1':'turn-badge-p2');
  document.getElementById('turn-num').textContent=G.turn;
}

function doStandby(){
  if(G.phase!=='main')return;
  // 全カード活動状態に
  activateAll();
  // ドロー
  drawCard(true);
  log(`${actLabel()} ターン${G.turn} スタンバイ：全カード活動状態・1枚ドロー完了。${G.turn===1&&G.currentPlayer===0?'先攻1ターン目は手札から1枚捨ててください。':''}`);
}

function nextPhase(){
  if(G.phase==='main'){
    G.phase='end';
    if(act().hand.length>7){
      log(`⚠ ${actLabel()} エンドフェイズ：手札が${act().hand.length}枚。${act().hand.length-7}枚捨てる必要があります（右クリック→捨て札）。`);
    } else {
      log(`${actLabel()} エンドフェイズへ移行。`);
    }
  } else if(G.phase==='end'){
    if(act().hand.length>7){
      if(!confirm(`${actLabel()} の手札が${act().hand.length}枚（上限7枚）。\n${act().hand.length-7}枚捨てる必要があります。\nこのまま次のターンに進みますか？`))return;
    }
    // ターン交代
    G.currentPlayer=1-G.currentPlayer;
    G.turn++;
    G.phase='main';
    log(`ターン交代！${actLabel()} のターン${G.turn}が始まります。スタンバイ実行を押してください。`);
  }
  setPhaseUI();
  renderAll();
}

function activateAll(){
  const p=act();
  p.mainField.forEach(c=>{if(c)c.active=true;});
  p.supportField.forEach(c=>{if(c)c.active=true;});
  p.mpField.forEach(c=>{c.active=true;});
  renderAll();
}

function drawCard(silent=false){
  const p=act();
  if(!p.deck.length){log(`⚠ ${actLabel()} のデッキが0枚！`);return;}
  const c=p.deck.shift(); c.active=true;
  p.hand.push(c);
  if(!silent)log(`${actLabel()}「${c.data[1]}」をドロー。手札${p.hand.length}枚。`);
  renderAll();
}

function switchSide(){
  // 相手フィールドの操作モード（手番外で操作できるよう一時的に切替）
  // 実用上は「サイドを見る」だけで状態は変えない
  // ここでは確認ダイアログで手番プレイヤーを入れ替える
  const msg=`現在 ${actLabel()} のターンです。\n「OK」を押すと ${oppLabel()} 側の操作画面に切り替えます（ターンは変わりません）。`;
  if(!confirm(msg))return;
  // 表示のみ切替（currentPlayerを一時的に逆にして再描画）
  G._viewAs = G._viewAs===undefined ? 1-G.currentPlayer : (G._viewAs===G.currentPlayer ? 1-G.currentPlayer : G.currentPlayer);
  renderAll();
  log(G._viewAs!==G.currentPlayer ? `${oppLabel()} 側の操作画面に切り替えました（ターンは ${actLabel()} のまま）。` : `${actLabel()} 側の操作画面に戻りました。`);
}

// 表示中の「手番プレイヤー」（viewAsを考慮）
function viewPlayer(){return G._viewAs!==undefined&&G._viewAs!==G.currentPlayer ? 1-G.currentPlayer : G.currentPlayer;}
function viewAct(){return G.players[viewPlayer()];}
function viewOpp(){return G.players[1-viewPlayer()];}
function viewActLabel(){return viewPlayer()===0?'1P':'2P';}
function viewOppLabel(){return viewPlayer()===0?'2P':'1P';}

// ===== 描画 =====
function cimg(num){return `<img src="${IMG}${num}" alt="${num}" loading="lazy" onerror="this.style.opacity='.3'">`;}

function renderInfoRow(p,elId,label,pi){
  const el=document.getElementById(elId);
  const pt=p.partner;
  el.innerHTML=`
    <div class="iz pt-iz" style="cursor:default">
      <div class="iz-lbl">${label} PARTNER</div>
      ${pt?`<div style="width:30px;height:42px;margin:0 auto 1px;overflow:hidden;">${cimg(pt[0])}</div><div class="pt-name" style="font-size:9px">${pt[1]}</div>`:'<div style="font-size:10px;color:var(--ink-light)">未設定</div>'}
    </div>
    <div class="iz" onclick="triggerLife(${pi})" title="クリックでライフダメージ処理">
      <div class="iz-lbl">LIFE</div>
      <div style="display:flex;gap:1px;flex-wrap:wrap;justify-content:center">${p.life.map(()=>'<span style="font-size:10px">🃏</span>').join('')}</div>
      <div class="iz-sub">${p.life.length}枚</div>
    </div>
    <div class="iz" onclick="${elId.includes('act')?'drawCard()':''}">
      <div class="iz-lbl">DECK</div>
      <div class="iz-val">${p.deck.length}</div>
    </div>
    <div class="iz" onclick="showTrash(${pi})">
      <div class="iz-lbl">TRASH</div>
      <div class="iz-val">${p.trash.length}</div>
      <div class="iz-sub">${p.trash.length?p.trash[p.trash.length-1].data[1].substring(0,4):'-'}</div>
    </div>
    <div class="iz" style="cursor:default;flex:1.5">
      <div class="iz-lbl">HAND</div>
      <div class="iz-val">${p.hand.length}</div>
    </div>`;
}

function renderField(p,mainId,supId,mpId,isAct){
  // メイン
  const mainEl=document.getElementById(mainId);
  mainEl.innerHTML='';
  for(let i=0;i<3;i++){
    const slot=document.createElement('div');
    slot.className='f-slot main-slot'+(p.mainField[i]?' has-card':'');
    slot._pi=isAct?viewPlayer():1-viewPlayer();
    slot._zone='main'; slot._idx=i;
    if(p.mainField[i]){
      const c=p.mainField[i];
      slot.innerHTML=`<div class="f-card${c.active?'':' rested'}" onclick="toggleFieldCard(this)" oncontextmenu="event.preventDefault();event.stopPropagation();openCtxField(event,this)">
        ${cimg(c.data[0])}
        <div class="f-card-btm">
          <div class="f-card-name">${c.data[1].substring(0,8)}</div>
          <div class="f-stat-row">
            ${c.data[5]!==null?`<span class="f-stat f-stat-ap">AP${c.data[5]}</span>`:''}
            ${c.data[6]!==null?`<span class="f-stat f-stat-dp">DP${c.data[6]}</span>`:''}
          </div>
        </div>
        ${c.data[4]!==null?`<div class="f-cost">${c.data[4]}</div>`:''}
      </div>`;
      slot._cardRef=c;
    } else { slot.textContent='空'; }
    mainEl.appendChild(slot);
  }
  // サポート
  const supEl=document.getElementById(supId);
  supEl.innerHTML='';
  for(let i=0;i<4;i++){
    const slot=document.createElement('div');
    slot.className='f-slot sup-slot'+(p.supportField[i]?' has-card':'');
    slot._pi=isAct?viewPlayer():1-viewPlayer();
    slot._zone='support'; slot._idx=i;
    if(p.supportField[i]){
      const c=p.supportField[i];
      slot.innerHTML=`<div class="f-card${c.active?'':' rested'}" onclick="toggleFieldCard(this)" oncontextmenu="event.preventDefault();event.stopPropagation();openCtxField(event,this)">
        ${cimg(c.data[0])}<div class="f-card-btm"><div class="f-card-name">${c.data[1].substring(0,8)}</div></div>
        ${c.data[4]!==null?`<div class="f-cost">${c.data[4]}</div>`:''}
      </div>`;
      slot._cardRef=c;
    } else { slot.textContent='空'; }
    supEl.appendChild(slot);
  }
  // MP
  const mpEl=document.getElementById(mpId);
  const pi=isAct?viewPlayer():1-viewPlayer();
  if(!p.mpField.length){ mpEl.innerHTML=isAct?'<div class="empty-hint">手札を右クリック → MPに置く</div>':'<div class="empty-hint">空</div>'; return; }
  mpEl.innerHTML=p.mpField.map((c,i)=>
    `<div class="mp-card${c.active?'':' rested'}" onclick="toggleMp(${pi},${i})" oncontextmenu="event.preventDefault();openCtxMp(event,${pi},${i})">${cimg(c.data[0])}</div>`
  ).join('');
}

function renderHand(){
  const p=viewAct();
  const el=document.getElementById('act-hand');
  const over=p.hand.length>7;
  el.innerHTML=p.hand.map((c,i)=>
    `<div class="h-card${over&&i>=7?' over-limit':''}" onclick="selectHand(${i})" oncontextmenu="event.preventDefault();event.stopPropagation();openCtxHand(event,${i})">
      ${cimg(c.data[0])}
    </div>`
  ).join('');
  document.getElementById('act-hand-over-warning').style.display=over?'block':'none';
  // 相手の手札（裏向き）
  const oppEl=document.getElementById('opp-hand-hidden');
  oppEl.innerHTML=viewOpp().hand.map(()=>`<div class="h-card-back">🃏</div>`).join('');
}

function renderAll(){
  setPhaseUI();
  // ヘッダー更新
  document.getElementById('act-label').textContent=`${viewActLabel()}${viewPlayer()===G.currentPlayer?' （あなたのターン）':'（サイド操作中）'}`;
  document.getElementById('opp-label').textContent=viewOppLabel();
  // 情報バー
  renderInfoRow(viewAct(),'act-info-row',viewActLabel(),viewPlayer());
  renderInfoRow(viewOpp(),'opp-info-row',viewOppLabel(),1-viewPlayer());
  // フィールド
  renderField(viewAct(),'act-main','act-support','act-mp',true);
  renderField(viewOpp(),'opp-main','opp-support','opp-mp',false);
  // 手札
  renderHand();
}

// ===== フィールド操作 =====
function toggleFieldCard(cardEl){
  const slot=cardEl.parentElement;
  const c=slot._cardRef;
  if(!c)return;
  c.active=!c.active;
  log(`「${c.data[1]}」を${c.active?'活動':'休息'}状態にしました。`);
  renderAll();
}

function toggleMp(pi,i){
  const c=G.players[pi].mpField[i];
  if(!c)return;
  c.active=!c.active;
  log(`MPの「${c.data[1]}」を${c.active?'活動':'休息'}状態にしました。`);
  renderAll();
}

function selectHand(i){ document.querySelectorAll('#act-hand .h-card').forEach((el,j)=>el.classList.toggle('sel',j===i)); }

// ===== コンテキストメニュー =====
function showCtx(e,card,zone,idx,pi){
  ctxTarget={card,zone,idx,pi};
  const [num,name,type,,,,,,,tags,text]=card.data;
  document.getElementById('ctx-name').textContent=name;
  document.getElementById('ctx-num').textContent=num;
  document.getElementById('ctx-eff').textContent=text||'';
  const inHand=zone==='hand';
  const inMain=zone==='main';
  const inSup=zone==='support';
  const inMp=zone==='mp';
  const inField=inMain||inSup;
  document.getElementById('ctx-main').style.display=inHand?'':'none';
  document.getElementById('ctx-sup').style.display=inHand?'':'none';
  document.getElementById('ctx-use').style.display=(inHand&&(type==='Magic'||type==='Event'||type==='Item'))?'':'none';
  document.getElementById('ctx-mp').style.display=inHand?'':'none';
  document.getElementById('ctx-toggle').style.display=(inField||inMp)?'':'none';
  document.getElementById('ctx-restore').style.display=inSup?'':'none';
  document.getElementById('ctx-down').style.display=inMain?'':'none';
  document.getElementById('ctx-tohand').style.display=(inField||inMp)?'':'none';
  document.getElementById('ctx-bottom').style.display=(inHand||inField||inMp)?'':'none';
  const menu=document.getElementById('ctx');
  menu.style.display='block';
  let x=e.clientX,y=e.clientY;
  if(x+190>window.innerWidth)x=window.innerWidth-200;
  if(y+260>window.innerHeight)y=window.innerHeight-270;
  menu.style.left=x+'px'; menu.style.top=y+'px';
}

function openCtxHand(e,i){ showCtx(e,viewAct().hand[i],'hand',i,viewPlayer()); }
function openCtxField(e,cardEl){
  const slot=cardEl.parentElement;
  const c=slot._cardRef;
  if(!c)return;
  showCtx(e,c,slot._zone,slot._idx,slot._pi);
}
function openCtxMp(e,pi,i){ showCtx(e,G.players[pi].mpField[i],'mp',i,pi); }
function closeCtx(){ document.getElementById('ctx').style.display='none'; ctxTarget=null; }

function ctxAct(action){
  if(!ctxTarget)return;
  const {card,zone,idx,pi}=ctxTarget;
  const p=G.players[pi];
  const name=card.data[1];
  const type=card.data[2];
  function remove(){
    if(zone==='hand')p.hand.splice(idx,1);
    else if(zone==='main')p.mainField[idx]=null;
    else if(zone==='support')p.supportField[idx]=null;
    else if(zone==='mp')p.mpField.splice(idx,1);
  }
  if(action==='main'){
    const s=p.mainField.findIndex(x=>!x);
    if(s===-1){alert('メインフィールドが満杯（3枚上限）');closeCtx();return;}
    remove();card.active=true;p.mainField[s]=card;log(`「${name}」をメインフィールドに出しました。`);
  }else if(action==='support'){
    const s=p.supportField.findIndex(x=>!x);
    if(s===-1){alert('サポートフィールドが満杯（4枚上限）');closeCtx();return;}
    remove();card.active=true;p.supportField[s]=card;log(`「${name}」をサポートフィールドに出しました。`);
  }else if(action==='use'){
    remove();p.trash.push(card);log(`「${name}」を使用しました（捨て札へ）。`);
  }else if(action==='mp'){
    remove();card.active=true;p.mpField.push(card);log(`「${name}」をMPフィールドに置きました。`);
  }else if(action==='toggle'){
    card.active=!card.active;log(`「${name}」を${card.active?'活動':'休息'}状態にしました。`);
  }else if(action==='restore'){
    const s=p.mainField.findIndex(x=>!x);
    if(s===-1){alert('メインフィールドが満杯');closeCtx();return;}
    remove();card.active=true;p.mainField[s]=card;log(`「${name}」をメインに復帰させました。`);
  }else if(action==='down'){
    const s=p.supportField.findIndex(x=>!x);
    if(s===-1){remove();p.trash.push(card);log(`「${name}」がダウン（捨て札）。`);}
    else{remove();p.supportField[s]=card;log(`「${name}」がダウン（サポートへ）。`);}
  }else if(action==='tohand'){
    remove();p.hand.push(card);log(`「${name}」を手札に戻しました。`);
  }else if(action==='bottom'){
    remove();card.active=true;p.deck.push(card);log(`「${name}」をデッキの下に戻しました。`);
  }else if(action==='trash'){
    remove();p.trash.push(card);log(`「${name}」を捨て札にしました。`);
  }
  closeCtx();
  renderAll();
}

// ===== ライフ =====
function triggerLife(pi){
  const p=G.players[pi];
  const label=pi===0?'1P':'2P';
  if(!p.life.length){log(`⚠ ${label}のライフが0枚！`);return;}
  pendingLife={card:p.life.shift(),pi};
  const [num,name,,,,,,,,,text]=pendingLife.card.data;
  const hasBreak=text&&text.includes('ブレイク');
  document.getElementById('life-card-info').innerHTML=
    `<div style="font-weight:700;margin-bottom:3px;">${name}</div><div style="font-size:9px;font-family:monospace;color:var(--ink-light)">${num}</div><div style="margin-top:5px;font-size:10px;line-height:1.5">${text||'テキストなし'}</div>`;
  document.getElementById('life-break-btn').style.display=hasBreak?'':'none';
  document.getElementById('life-modal').style.display='flex';
  log(`${label} ライフダメージ！「${name}」を公開しました。処理を選択してください。`);
}

function resolveLife(action){
  if(!pendingLife)return;
  const {card,pi}=pendingLife;
  const p=G.players[pi];
  const label=pi===0?'1P':'2P';
  const name=card.data[1];
  if(action==='hand'){card.active=true;p.hand.push(card);log(`${label}「${name}」を手札に加えました。残ライフ${p.life.length}枚。`);}
  else if(action==='mp'){card.active=true;p.mpField.push(card);log(`${label}「${name}」をMPへ。残ライフ${p.life.length}枚。`);}
  else if(action==='break'){p.trash.push(card);log(`${label}「${name}」のブレイク効果使用（捨て札）。残ライフ${p.life.length}枚。`);}
  if(!p.life.length)log(`⚠ ${label}のライフが0枚！次のパートナーへのダメージで敗北です。`);
  pendingLife=null;
  document.getElementById('life-modal').style.display='none';
  renderAll();
}

// ===== 捨て札 =====
function showTrash(pi){
  const p=G.players[pi];
  const label=pi===0?'1P':'2P';
  document.getElementById('trash-modal-title').textContent=`${label}の捨て札`;
  const list=document.getElementById('trash-list');
  if(!p.trash.length){list.innerHTML='<div style="padding:16px;text-align:center;color:var(--ink-light)">捨て札はありません</div>';}
  else{
    list.innerHTML=[...p.trash].reverse().map((c,i)=>{
      const ri=p.trash.length-1-i;
      return `<div class="trash-item">
        <span class="trash-num">${c.data[0]}</span>
        <span class="trash-name">${c.data[1]}</span>
        <button class="trash-act" onclick="trashAction(${pi},${ri},'hand')">手札へ</button>
        <button class="trash-act" onclick="trashAction(${pi},${ri},'deck')">デッキへ</button>
      </div>`;
    }).join('');
  }
  document.getElementById('trash-modal').style.display='flex';
}

function trashAction(pi,idx,dest){
  const p=G.players[pi];
  const label=pi===0?'1P':'2P';
  const c=p.trash.splice(idx,1)[0];
  c.active=true;
  if(dest==='hand'){p.hand.push(c);log(`${label} 捨て札から「${c.data[1]}」を手札に戻しました。`);}
  else{p.deck.push(c);log(`${label} 捨て札から「${c.data[1]}」をデッキ下に戻しました。`);}
  document.getElementById('trash-modal').style.display='none';
  renderAll();
}

// ===== ログ =====
function log(msg){document.getElementById('log-bar').textContent=msg;}

document.addEventListener('click',()=>closeCtx());
initSetup();
</script>
